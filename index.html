<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover">
    <title>Gestión Consorcios Pro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #0b141a; --card: #111b21; --primary: #2563eb; --danger: #e11d48; 
            --text: #e9edef; --border: #222d34; --success: #22c55e; --warning: #f59e0b;
            --purple: #a855f7; --orange: #f97316;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
        .wrap { width: 95%; max-width: 450px; padding-top: 210px; padding-bottom: 80px; }
        .hidden { display: none !important; }

        /* Cabecera Fija */
        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary); }
        .filter-bar { display: flex; gap: 5px; margin-top: 10px; overflow-x: auto; padding-bottom: 5px; }
        .btn-filter { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); background: #1d2a33; color: #aaa; font-size: 0.8em; cursor: pointer; white-space: nowrap; }
        .btn-filter.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* UI Elements */
        input, select, textarea { width: 100%; padding: 12px; background: #1d2a33; border: 1px solid var(--border); color: #fff; border-radius: 8px; outline: none; margin-bottom: 10px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--border); }
        .btn { padding: 10px; border-radius: 8px; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 5px; font-weight: 600; }
        
        /* Historial e Items */
        .hist-item { background: #1a242d; padding: 12px; margin-top: 8px; border-radius: 8px; font-size: 0.85em; position: relative; border-left: 5px solid #ccc; }
        .st-convivencia { border-left-color: var(--purple); }
        .st-transito { border-left-color: var(--orange); }
        .btn-del { position: absolute; top: 5px; right: 5px; color: var(--danger); background: none; border: none; font-size: 1.1em; cursor: pointer; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
        .modal-content { background: var(--card); width: 100%; max-width: 400px; padding: 20px; border-radius: 15px; border: 1px solid var(--primary); max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="wrap">
        <header class="main-header">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h2 style="color: var(--primary); font-size: 1.2em;">Gestión Consorcio</h2>
                <button class="btn btn-primary" onclick="window.loadData()"><i class="fas fa-sync"></i></button>
            </div>
            <input type="text" id="search-input" placeholder="Buscar UF o Nombre..." oninput="window.filterList()">
            <div class="filter-bar">
                <button class="btn-filter active" onclick="window.setFilter('TODOS', this)">Todos</button>
                <button class="btn-filter" onclick="window.setFilter('COCHERA', this)">Cocheras</button>
                <button class="btn-filter" onclick="window.setFilter('LOCAL', this)">Locales</button>
                <button class="btn-filter" onclick="window.setFilter('DEPTO', this)">Deptos</button>
            </div>
        </header>

        <div id="listado">Cargando...</div>
    </div>

    <div id="modal-infraccion" class="modal hidden">
        <div class="modal-content" style="border-color: var(--warning);">
            <h3 id="inf-title" style="margin-bottom:15px; color:var(--warning)">Infracción</h3>
            <p id="inf-cat-auto" style="font-size: 0.8em; color: #aaa; margin-bottom: 10px;"></p>
            
            <label>Descripción del hecho:</label>
            <textarea id="inf-desc" rows="4" placeholder="Ej: Obstrucción de rampa..."></textarea>
            
            <div style="display:flex; gap:10px;">
                <button class="btn btn-danger" style="flex:1" onclick="document.getElementById('modal-infraccion').classList.add('hidden')">Cerrar</button>
                <button class="btn" style="flex:1; background: var(--success); color: white;" id="btn-save-inf">Notificar WSP</button>
            </div>
        </div>
    </div>

    <div id="modal-edit" class="modal hidden">
        <div class="modal-content">
            <h3 id="edit-title" style="margin-bottom:15px; color:var(--primary)">Editar Registro</h3>
            <textarea id="edit-desc" rows="4"></textarea>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-danger" style="flex:1" onclick="document.getElementById('modal-edit').classList.add('hidden')">Cancelar</button>
                <button class="btn btn-primary" style="flex:1" id="btn-update-reg">Actualizar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, addDoc, updateDoc, deleteDoc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo",
            authDomain: "gestionuf-remoto.firebaseapp.com",
            projectId: "gestionuf-remoto",
            storageBucket: "gestionuf-remoto.appspot.com",
            messagingSenderId: "724452752860",
            appId: "1:724452752860:web:4d25585addcdcbd146e319"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let departamentos = [];
        let currentFilter = 'TODOS';
        let currentUFId = null;
        let activeEditId = null;
        let activeEditColl = "";

        // --- LÓGICA DE RANGOS ---
        const getCategoria = (uf) => {
            const n = parseInt(uf);
            if (n >= 0 && n <= 87) return "COCHERA";
            if (n >= 88 && n <= 102) return "LOCAL";
            if (n >= 103 && n <= 277) return "DEPTO";
            return "OTROS";
        };

        window.loadData = async () => {
            const list = document.getElementById("listado");
            list.innerHTML = "<p style='text-align:center'>Sincronizando...</p>";
            try {
                const snap = await getDocs(query(collection(db, "departamentos"), orderBy("UF", "asc")));
                departamentos = snap.docs.map(d => ({ id: d.id, cat: getCategoria(d.UF), ...d.data() }));
                window.filterList();
            } catch (e) { console.error(e); }
        };

        window.setFilter = (type, btn) => {
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = type;
            window.filterList();
        };

        window.filterList = () => {
            const search = document.getElementById("search-input").value.toLowerCase();
            const filtered = departamentos.filter(d => {
                const matchesSearch = d.UF.toString().includes(search) || d.Propietario?.toLowerCase().includes(search);
                const matchesTab = currentFilter === 'TODOS' || d.cat === currentFilter;
                return matchesSearch && matchesTab;
            });
            render(filtered);
        };

        function render(data) {
            const list = document.getElementById("listado");
            list.innerHTML = "";
            data.forEach(d => {
                list.innerHTML += `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:center">
                            <div>
                                <small style="color:var(--primary)">${d.cat}</small>
                                <h3 style="color:white">UF ${d.UF}</h3>
                                <p style="font-size:0.8em; color:#8696a0">${d.Propietario || '---'}</p>
                            </div>
                            <div style="display:flex; gap:10px">
                                <button class="btn" style="background:var(--warning); color:white" onclick="window.openInf('${d.id}', '${d.UF}', '${d.cat}')"><i class="fas fa-exclamation-triangle"></i></button>
                                <button class="btn" style="background:var(--primary); color:white" onclick="window.verTodo('${d.id}', '${d.UF}')"><i class="fas fa-eye"></i></button>
                            </div>
                        </div>
                        <div id="det-${d.id}" class="hidden" style="margin-top:15px; border-top:1px solid var(--border); padding-top:10px"></div>
                    </div>`;
            });
        }

        // --- GESTIÓN INFRACCIONES ---
        window.openInf = (id, uf, cat) => {
            currentUFId = id;
            document.getElementById("inf-title").innerText = "Infracción UF " + uf;
            document.getElementById("inf-cat-auto").innerText = "Categoría detectada: " + cat;
            document.getElementById("inf-desc").value = "";
            document.getElementById("modal-infraccion").classList.remove("hidden");
        };

        document.getElementById("btn-save-inf").onclick = async () => {
            const desc = document.getElementById("inf-desc").value.trim();
            const ufTxt = document.getElementById("inf-title").innerText.split(" ");
            if(!desc) return alert("Escriba el motivo");

            const cat = getCategoria(ufTxt);
            const data = {
                id_uf: currentUFId,
                nro_uf: ufTxt,
                tipo: (cat === 'COCHERA') ? "Transito" : "Convivencia",
                descripcion: desc,
                fecha: new Date().toLocaleDateString()
            };

            try {
                await addDoc(collection(db, "infracciones"), data);
                const msg = `*SISTEMA DE GESTION*%0A*UF:* ${ufTxt}%0A*Motivo:* ${desc}`;
                window.open(`https://wa.me/5491131552679?text=${msg}`, '_blank');
                document.getElementById("modal-infraccion").classList.add("hidden");
                window.loadData();
            } catch (e) { alert("Error al guardar"); }
        };

        // --- VER HISTORIAL COMPLETO ---
        window.verTodo = async (id, uf) => {
            const el = document.getElementById("det-" + id);
            el.classList.toggle("hidden");
            if(el.classList.contains("hidden")) return;

            el.innerHTML = "<small>Cargando...</small>";
            try {
                const qRep = query(collection(db, "reparaciones"), where("id_uf", "==", id));
                const qInf = query(collection(db, "infracciones"), where("id_uf", "==", id));
                const [sRep, sInf] = await Promise.all([getDocs(qRep), getDocs(qInf)]);
                
                el.innerHTML = (sRep.empty && sInf.empty) ? "<p style='font-size:0.8em'>Sin registros.</p>" : "";

                sRep.forEach(doc => {
                    const r = doc.data();
                    el.innerHTML += `
                        <div class="hist-item" style="border-left-color: var(--success)">
                            <b>🔧 Rep:</b> ${r.descripcion} <br> <small>${r.fecha}</small>
                            <button class="btn-del" style="right:30px; color:var(--primary)" onclick="window.editReg('reparaciones','${doc.id}','${r.descripcion}')"><i class="fas fa-edit"></i></button>
                            <button class="btn-del" onclick="window.deleteReg('reparaciones','${doc.id}')"><i class="fas fa-trash"></i></button>
                        </div>`;
                });

                sInf.forEach(doc => {
                    const i = doc.data();
                    const cl = i.tipo === "Transito" ? "st-transito" : "st-convivencia";
                    el.innerHTML += `
                        <div class="hist-item ${cl}">
                            <b>⚠️ Inf:</b> ${i.descripcion} <br> <small>${i.fecha}</small>
                            <button class="btn-del" style="right:30px; color:var(--primary)" onclick="window.editReg('infracciones','${doc.id}','${i.descripcion}')"><i class="fas fa-edit"></i></button>
                            <button class="btn-del" onclick="window.deleteReg('infracciones','${doc.id}')"><i class="fas fa-trash"></i></button>
                        </div>`;
                });
            } catch (e) { el.innerHTML = "Error de conexión"; }
        };

        // --- EDITAR Y ELIMINAR ---
        window.editReg = (coll, id, oldDesc) => {
            activeEditColl = coll;
            activeEditId = id;
            document.getElementById("edit-desc").value = oldDesc;
            document.getElementById("modal-edit").classList.remove("hidden");
        };

        document.getElementById("btn-update-reg").onclick = async () => {
            const newDesc = document.getElementById("edit-desc").value;
            try {
                await updateDoc(doc(db, activeEditColl, activeEditId), { descripcion: newDesc });
                document.getElementById("modal-edit").classList.add("hidden");
                window.loadData();
            } catch (e) { alert("Error al actualizar"); }
        };

        window.deleteReg = async (coll, id) => {
            const pin = prompt("Ingrese Clave Maestra para eliminar:");
            if(pin === "4750") {
                try {
                    await deleteDoc(doc(db, coll, id));
                    window.loadData();
                } catch (e) { alert("Error"); }
            } else if(pin !== null) {
                alert("Clave incorrecta");
            }
        };

        window.loadData();
    </script>
</body>
</html>
