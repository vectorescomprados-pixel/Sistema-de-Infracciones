<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover">
    <title>Gestión de Infracciones Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b141a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="icono.png">
    <link rel="apple-touch-icon" href="icono.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #0b141a; --card: #111b21; --primary: #2563eb; --danger: #e11d48; 
            --text: #e9edef; --border: #222d34; --success: #22c55e; --warning: #f59e0b;
            --purple: #a855f7; --orange: #f97316;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
        .wrap { width: 95%; max-width: 450px; padding-top: 210px; padding-bottom: 80px; position: relative; }
        .hidden { display: none !important; }

        .btn-home {
            position: fixed; top: 15px; left: 15px; z-index: 9999;
            background: var(--primary); color: white; border: none;
            border-radius: 50%; width: 45px; height: 45px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #btn-rocket {
            position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px;
            background: var(--primary); color: white; border-radius: 50%; border: none;
            font-size: 1.5em; cursor: pointer; display: none; z-index: 2000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); align-items: center; justify-content: center;
        }

        .main-header { position: fixed; top: 0; width: 95%; max-width: 450px; background: var(--card); z-index: 1000; padding: 15px; border-bottom: 3px solid var(--primary); }
        .filter-bar { display: flex; gap: 5px; margin-top: 10px; overflow-x: auto; padding-bottom: 5px; }
        .btn-filter { padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border); background: #1d2a33; color: #aaa; font-size: 0.8em; cursor: pointer; white-space: nowrap; flex: 1; }
        .btn-filter.active { color: white; border-color: transparent; }
        
        /* Colores específicos de filtros activos */
        .filter-cochera.active { background: var(--orange) !important; }
        .filter-local.active { background: var(--purple) !important; }
        .filter-depto.active { background: var(--primary) !important; }

        input, textarea { width: 100%; padding: 12px; background: #1d2a33; border: 1px solid var(--border); color: #fff; border-radius: 8px; outline: none; margin-bottom: 10px; font-size: 16px; }
        
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--border); }
        .btn { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; }
        
        .hist-item { background: #1a242d; padding: 12px; margin-top: 8px; border-radius: 8px; font-size: 0.85em; position: relative; border-left: 5px solid #ccc; }
        .st-convivencia { border-left-color: var(--purple); }
        .st-transito { border-left-color: var(--orange); }
        
        .btn-action-hist { cursor: pointer; font-size: 0.8em; margin-right: 15px; font-weight: bold; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
        .modal-content { background: var(--card); width: 100%; max-width: 400px; padding: 25px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }

        .btn-authorize { background: #2563eb; color: white; flex: 1; }
        .btn-return { background: #e11d48; color: white; flex: 1; }
        .security-input { text-align: center; letter-spacing: 5px; font-weight: bold; font-size: 1.2em; border-color: var(--primary); }
    </style>
</head>
<body>

    <a href="https://vectorescomprados-pixel.github.io/Gestion-de-Consorcios/" class="btn-home">
        <i class="fas fa-home"></i>
    </a>

    <button id="btn-rocket" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        <i class="fas fa-rocket"></i>
    </button>

    <div class="wrap">
        <header class="main-header">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-left: 50px;">
                <h2 style="color: var(--primary); font-size: 1.1em;">Infracciones Internas</h2>
                <button class="btn" style="background: var(--primary); color:white" onclick="window.loadData()"><i class="fas fa-sync"></i></button>
            </div>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="search-input" placeholder="Buscar UF o Propietario, Inquilino..." oninput="window.filterList()">
                <button class="btn" style="background:var(--danger); color:white; margin-bottom:10px" onclick="window.clearSearch()"><i class="fas fa-times"></i></button>
            </div>
            <div class="filter-bar">
                <button class="btn-filter filter-cochera active" onclick="window.setFilter('COCHERA', this)">Cocheras</button>
                <button class="btn-filter filter-local" onclick="window.setFilter('LOCAL', this)">Locales</button>
                <button class="btn-filter filter-depto" onclick="window.setFilter('DEPTO', this)">Deptos</button>
            </div>
        </header>
        <div id="listado">Cargando...</div>
    </div>

    <div id="modal-security" class="modal hidden">
        <div class="modal-content">
            <h3 style="color:white; margin-bottom: 5px;">Seguridad Requerida</h3>
            <p id="security-msg" style="color: #8696a0; margin-bottom: 20px; font-size: 0.9em;"></p>
            <input type="password" id="master-pin" class="security-input" placeholder="Clave Administrativa">
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button class="btn btn-authorize" id="btn-auth-confirm">AUTORIZAR</button>
                <button class="btn btn-return" onclick="window.closeSecurity()">VOLVER</button>
            </div>
        </div>
    </div>

    <div id="modal-infraccion" class="modal hidden">
        <div class="modal-content" style="border-color: var(--warning);">
            <h3 id="inf-title" style="color:var(--warning)">Nueva Infracción</h3>
            <p id="inf-cat-auto" style="font-size: 0.75em; color: #aaa; margin: 10px 0;"></p>
            <textarea id="inf-desc" rows="4" placeholder="Describa el motivo..."></textarea>
            <div style="display:flex; flex-direction: column; gap:8px;">
                <div style="display:flex; gap:8px;">
                    <button class="btn" style="background:var(--primary); color:white; flex:1" id="btn-save-silent">Solo Guardar</button>
                    <button class="btn" style="background:var(--success); color:white; flex:1" id="btn-save-wsp"><i class="fab fa-whatsapp"></i> Notificar</button>
                </div>
                <button class="btn" style="background:var(--danger); color:white" onclick="document.getElementById('modal-infraccion').classList.add('hidden')">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="modal-edit" class="modal hidden">
        <div class="modal-content">
            <h3 id="edit-header" style="color:var(--primary); margin-bottom:10px;">Corregir e Informar</h3>
            <textarea id="edit-desc" rows="4"></textarea>
            <div style="display:flex; flex-direction: column; gap:8px;">
                <div style="display:flex; gap:8px;">
                    <button class="btn" style="background:var(--primary); color:white; flex:1" id="btn-update-silent">Actualizar</button>
                    <button class="btn" style="background:var(--success); color:white; flex:1" id="btn-update-wsp"><i class="fab fa-whatsapp"></i> Notificar</button>
                </div>
                <button class="btn" style="background:var(--danger); color:white" onclick="document.getElementById('modal-edit').classList.add('hidden')">Cerrar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, addDoc, updateDoc, deleteDoc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDxw26xM3pliNxo79LdvWkr0uOGdvCgiIo",
            authDomain: "gestionuf-remoto.firebaseapp.com",
            projectId: "gestionuf-remoto",
            storageBucket: "gestionuf-remoto.appspot.com",
            messagingSenderId: "724452752860",
            appId: "1:724452752860:web:4d25585addcdcbd146e319"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let departamentos = [];
        let currentFilter = 'COCHERA'; // ARRANCA POR DEFECTO EN COCHERAS
        let currentUFId = null;
        let activeEditId = null;
        let activeEditUF = "";
        let pendingDeleteId = null;

        window.onscroll = () => { document.getElementById("btn-rocket").style.display = window.scrollY > 300 ? "flex" : "none"; };

        const getCategoria = (uf) => {
            const n = parseInt(uf);
            if (n >= 0 && n <= 87) return "COCHERA";
            if (n >= 88 && n <= 102) return "LOCAL";
            if (n >= 103 && n <= 277) return "DEPTO";
            return "OTROS";
        };

        window.loadData = async () => {
            const list = document.getElementById("listado");
            list.innerHTML = "<p style='text-align:center; padding:20px'>Sincronizando...</p>";
            try {
                const snap = await getDocs(query(collection(db, "departamentos"), orderBy("UF", "asc")));
                departamentos = snap.docs.map(d => ({ id: d.id, cat: getCategoria(d.data().UF), ...d.data() }));
                window.filterList();
            } catch (e) { console.error(e); }
        };

        window.clearSearch = () => { document.getElementById("search-input").value = ""; window.filterList(); };

        window.setFilter = (type, btn) => {
            window.clearSearch();
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const si = document.getElementById("search-input");
            si.style.borderColor = type==='COCHERA'?'var(--orange)':type==='LOCAL'?'var(--purple)':type==='DEPTO'?'var(--primary)':'var(--border)';
            currentFilter = type;
            window.filterList();
        };

        window.filterList = () => {
            const s = document.getElementById("search-input").value.toLowerCase();
            const f = departamentos.filter(d => {
                const ms = String(d.UF).toLowerCase().includes(s) || 
                           (d.Propietario || "").toLowerCase().includes(s) || 
                           (d.Inquilino || "").toLowerCase().includes(s);
                const mt = (d.cat === currentFilter); 
                return ms && mt;
            });
            render(f);
        };

        function render(data) {
            const list = document.getElementById("listado");
            list.innerHTML = data.length ? "" : "<p style='text-align:center; padding:20px'>Sin datos en esta categoría.</p>";
            data.forEach(d => {
                list.innerHTML += `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:center">
                            <div>
                                <small style="color:var(--primary); font-weight:bold">${d.cat}</small>
                                <h3 style="color:white; margin:2px 0">UF ${d.UF}</h3>
                                <p style="font-size:0.8em; color:#8696a0">${d.Propietario || '---'}</p>
                            </div>
                            <div style="display:flex; gap:10px">
                                <button class="btn" style="background:var(--warning); color:white; padding:8px" onclick="window.openInf('${d.id}', '${d.UF}', '${d.cat}')"><i class="fas fa-exclamation-triangle"></i></button>
                                <button class="btn" style="background:var(--primary); color:white; padding:8px" onclick="window.verInfracciones('${d.id}', '${d.UF}')"><i class="fas fa-eye"></i></button>
                            </div>
                        </div>
                        <div id="det-${d.id}" class="hidden" style="margin-top:15px; border-top:1px solid var(--border); padding-top:10px"></div>
                    </div>`;
            });
        }

        window.openSecurity = (id, nro) => {
            pendingDeleteId = id;
            document.getElementById("security-msg").innerText = "¿Borrar registro UF " + nro + "?";
            document.getElementById("master-pin").value = "";
            document.getElementById("modal-security").classList.remove("hidden");
            setTimeout(() => document.getElementById("master-pin").focus(), 300);
        };

        window.closeSecurity = () => { document.getElementById("modal-security").classList.add("hidden"); pendingDeleteId = null; };

        document.getElementById("btn-auth-confirm").onclick = async () => {
            if(document.getElementById("master-pin").value === "4750") {
                await deleteDoc(doc(db, "infracciones", pendingDeleteId));
                window.closeSecurity(); window.loadData();
            } else { alert("Clave incorrecta"); }
        };

        window.openInf = (id, uf, cat) => {
            currentUFId = id;
            document.getElementById("inf-title").innerText = "Infracción UF " + uf;
            document.getElementById("inf-cat-auto").innerText = "TIPO: " + cat;
            document.getElementById("inf-desc").value = "";
            document.getElementById("modal-infraccion").classList.remove("hidden");
        };

        const procesarGuardado = async (conWsp) => {
            const desc = document.getElementById("inf-desc").value.trim();
            const ufRaw = document.getElementById("inf-title").innerText.split(" ");
            if(!desc) return alert("Escribe un motivo");
            const data = { id_uf: currentUFId, nro_uf: ufRaw, tipo: (getCategoria(ufRaw) === 'COCHERA') ? "Transito" : "Convivencia", descripcion: desc, fecha: new Date().toLocaleDateString(), created: Date.now() };
            try {
                await addDoc(collection(db, "infracciones"), data);
                if(conWsp) window.open(`https://wa.me/5491131552679?text=*INFRACCIÓN UF ${ufRaw}*%0A${desc}`, '_blank');
                document.getElementById("modal-infraccion").classList.add("hidden");
                window.clearSearch(); window.loadData();
            } catch (e) { alert("Error"); }
        };

        document.getElementById("btn-save-silent").onclick = () => procesarGuardado(false);
        document.getElementById("btn-save-wsp").onclick = () => procesarGuardado(true);

        window.verInfracciones = async (id, uf) => {
            const el = document.getElementById("det-" + id);
            el.classList.toggle("hidden");
            if(el.classList.contains("hidden")) return;
            el.innerHTML = "<small>Cargando...</small>";
            const q = query(collection(db, "infracciones"), where("id_uf", "==", id));
            const snap = await getDocs(q);
            let logs = [];
            snap.forEach(ds => logs.push({id: ds.id, ...ds.data()}));
            logs.sort((a, b) => b.created - a.created);
            el.innerHTML = logs.length ? "" : "<p style='font-size:0.8em; color:var(--warning)'>Sin infracciones.</p>";
            logs.forEach(i => {
                el.innerHTML += `<div class="hist-item ${i.tipo === "Transito" ? "st-transito" : "st-convivencia"}">
                    <b>${i.tipo.toUpperCase()}:</b> ${i.descripcion}<br><small>${i.fecha}</small>
                    <div style="margin-top:8px; display:flex;">
                        <span class="btn-action-hist" style="color:var(--primary)" onclick="window.editInf('${i.id}','${i.descripcion}', '${uf}')"><i class="fas fa-edit"></i> Editar</span>
                        <span class="btn-action-hist" style="color:var(--danger)" onclick="window.openSecurity('${i.id}','${uf}')"><i class="fas fa-trash"></i> Borrar</span>
                    </div></div>`;
            });
        };

        window.editInf = (id, old, uf) => {
            activeEditId = id; activeEditUF = uf;
            document.getElementById("edit-desc").value = old;
            document.getElementById("edit-header").innerText = "Editar UF " + uf;
            document.getElementById("modal-edit").classList.remove("hidden");
        };

        const procesarActualizacion = async (conWsp) => {
            const desc = document.getElementById("edit-desc").value.trim();
            await updateDoc(doc(db, "infracciones", activeEditId), { descripcion: desc });
            if(conWsp) window.open(`https://wa.me/5491131552679?text=*ACTUALIZACIÓN UF ${activeEditUF}*%0A${desc}`, '_blank');
            document.getElementById("modal-edit").classList.add("hidden");
            window.loadData();
        };

        document.getElementById("btn-update-silent").onclick = () => procesarActualizacion(false);
        document.getElementById("btn-update-wsp").onclick = () => procesarActualizacion(true);

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); }); }
        window.loadData();
    </script>
</body>
</html>
